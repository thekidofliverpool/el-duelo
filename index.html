<style>
  :root{
    --bg:#140F22; --bg2:#1B1333; --surface:rgba(255,255,255,.045); --surface2:#241B3C;
    --line:rgba(255,255,255,.08); --text:#F3EFFB; --muted:#A99FC9; --faint:#6E6593;
    --p1:#27DCE8; --p1d:#0E8F9C; --p2:#FF6F91; --p2d:#D24468;
    --gold:#FFD45E; --good:#6FE7AE; --bad:#FF6B6B;
    --r:20px; --r-sm:14px;
    --disp:'Bricolage Grotesque', system-ui, sans-serif;
    --body:'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--body); color:var(--text); background:var(--bg);
    background-image:radial-gradient(120% 60% at 0% 0%, rgba(39,220,232,.16), transparent 60%),
      radial-gradient(120% 60% at 100% 0%, rgba(255,111,145,.16), transparent 60%),
      linear-gradient(180deg,#1B1333 0%, #140F22 40%);
    background-attachment:fixed; min-height:100vh; -webkit-font-smoothing:antialiased;}
  #root{max-width:540px; margin:0 auto; padding:max(14px,env(safe-area-inset-top)) 14px 96px; min-height:100vh}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  button:focus-visible{outline:2px solid var(--gold); outline-offset:2px; border-radius:10px}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .center{text-align:center}
  h1,h2,h3{font-family:var(--disp); margin:0; letter-spacing:-.02em}

  .brand{display:flex; align-items:center; justify-content:space-between; margin:2px 2px 12px}
  .brand .logo{font-family:var(--disp); font-weight:800; font-size:20px; display:flex; align-items:center; gap:8px}
  .brand .logo span{background:linear-gradient(90deg,var(--p1),var(--p2)); -webkit-background-clip:text; background-clip:text; color:transparent}
  .sync{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:var(--muted); background:var(--surface); border:1px solid var(--line); padding:5px 10px; border-radius:999px}
  .sdot{width:8px;height:8px;border-radius:50%;background:var(--faint)}
  .sdot.ok{background:var(--good); box-shadow:0 0 8px var(--good)}
  .sdot.err{background:var(--bad)}

  .arena{position:relative; background:var(--surface); border:1px solid var(--line); border-radius:24px; padding:18px 16px 16px; overflow:hidden}
  .arena:before{content:''; position:absolute; inset:0; background:
     radial-gradient(80% 120% at 0% 0%, rgba(39,220,232,.10), transparent 55%),
     radial-gradient(80% 120% at 100% 0%, rgba(255,111,145,.10), transparent 55%); pointer-events:none}
  .duelTop{display:grid; grid-template-columns:1fr auto 1fr; align-items:end; gap:6px; position:relative}
  .fighter{display:flex; flex-direction:column; align-items:center; gap:6px}
  .ava{width:62px; height:62px; border-radius:50%; display:grid; place-items:center; font-size:31px; background:#1f1838; position:relative}
  .ava.l{box-shadow:0 0 0 3px var(--p1), 0 8px 24px rgba(39,220,232,.30)}
  .ava.r{box-shadow:0 0 0 3px var(--p2), 0 8px 24px rgba(255,111,145,.30)}
  .crown{position:absolute; top:-20px; font-size:22px; animation:bob 2.2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-4px) rotate(6deg)}}
  .fname{font-weight:800; font-size:13px}
  .fscore{font-family:var(--disp); font-weight:800; font-size:30px; line-height:1}
  .fscore.neg{color:var(--bad)!important}
  .vs{font-family:var(--disp); font-weight:800; color:var(--faint); font-size:15px; padding-bottom:18px}
  .meter{margin-top:14px; height:16px; border-radius:999px; background:#120D20; overflow:hidden; display:flex; border:1px solid var(--line)}
  .meter .a{background:linear-gradient(90deg,var(--p1d),var(--p1)); transition:width .7s cubic-bezier(.22,1,.36,1)}
  .meter .b{background:linear-gradient(90deg,var(--p2),var(--p2d)); transition:width .7s cubic-bezier(.22,1,.36,1); margin-left:auto}
  .arenaFoot{display:flex; align-items:center; justify-content:space-between; margin-top:12px; gap:10px}
  .prizebox{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--muted); background:var(--surface); border:1px solid var(--line); padding:8px 11px; border-radius:12px; flex:1; min-width:0}
  .prizebox b{color:var(--gold)}
  .daysleft{font-size:11px; font-weight:700; color:var(--muted); white-space:nowrap; text-align:right}
  .daysleft b{font-family:var(--disp); font-size:15px; color:var(--text)}

  .switch{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:16px 0 6px; background:#120D20; border:1px solid var(--line); border-radius:16px; padding:5px}
  .switch button{padding:11px 8px; border-radius:12px; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center; gap:8px; color:var(--muted); transition:.15s}
  .switch button .dot{width:9px;height:9px;border-radius:50%}
  .switch button.on{color:#0c0918}
  .sectlabel{font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); margin:18px 4px 9px; display:flex; align-items:center; justify-content:space-between}

  .habit{position:relative; display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:13px; margin-bottom:9px; transition:transform .12s, border-color .2s, background .2s; overflow:hidden}
  .habit.done{background:var(--tint); border-color:var(--bord)}
  .habit.pop{animation:pop .42s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.035)}100%{transform:scale(1)}}
  .hemoji{width:44px;height:44px;flex:none;border-radius:13px;display:grid;place-items:center;font-size:23px;background:#1e1738}
  .hmain{flex:1; min-width:0}
  .hname{font-weight:700; font-size:15px; display:flex; align-items:center; gap:7px; flex-wrap:wrap}
  .htag{font-size:10px; font-weight:800; padding:2px 7px; border-radius:999px; background:rgba(255,212,94,.14); color:var(--gold)}
  .hsub{font-size:12px; color:var(--muted); margin-top:3px; display:flex; align-items:center; gap:9px; flex-wrap:wrap}
  .flame{display:inline-flex; align-items:center; gap:3px; font-weight:800; color:var(--gold)}
  .check{width:46px;height:46px;flex:none;border-radius:50%;border:2px solid rgba(255,255,255,.16);display:grid;place-items:center;font-size:22px;font-weight:900;color:var(--faint);transition:.15s;background:#160f28}
  .check.on{border-color:transparent; color:#0c0918}
  .floatpts{position:absolute; right:18px; top:50%; font-family:var(--disp); font-weight:800; font-size:18px; pointer-events:none; animation:floatup 1s ease-out forwards}
  @keyframes floatup{0%{opacity:0; transform:translateY(6px)}20%{opacity:1}100%{opacity:0; transform:translateY(-26px)}}

  /* monedero */
  .wallet{display:flex; align-items:center; justify-content:space-between; gap:12px; background:linear-gradient(135deg, rgba(255,212,94,.13), rgba(255,255,255,.03)); border:1px solid rgba(255,212,94,.3); border-radius:var(--r); padding:14px 16px; margin:6px 0 4px}
  .wlabel{font-size:12px; font-weight:800; color:var(--muted); letter-spacing:.02em}
  .wval{font-family:var(--disp); font-weight:800; font-size:27px; line-height:1; margin-top:5px}
  .wval span{font-size:12px; font-weight:700; color:var(--muted); font-family:var(--body); margin-left:5px}
  .whint{font-size:10.5px; color:var(--faint); text-align:right; max-width:96px; line-height:1.35}

  /* tienda de antojos */
  .shopnote{font-size:12px; color:var(--muted); margin:-2px 4px 9px; line-height:1.5}
  .vice{position:relative; display:flex; align-items:center; gap:12px; background:linear-gradient(135deg, rgba(255,107,107,.07), rgba(255,255,255,.02)); border:1px solid rgba(255,107,107,.18); border-radius:var(--r); padding:12px 13px; margin-bottom:9px; overflow:hidden}
  .vice.used{border-color:rgba(255,107,107,.4)}
  .vemoji{width:42px;height:42px;flex:none;border-radius:12px;display:grid;place-items:center;font-size:22px;background:#241526}
  .price{font-family:var(--disp); font-weight:800; font-size:13px; color:var(--gold); background:rgba(255,212,94,.1); border:1px solid rgba(255,212,94,.24); padding:3px 9px; border-radius:8px; white-space:nowrap}
  .warn{font-size:10.5px; font-weight:800; color:var(--gold); background:rgba(255,212,94,.1); border:1px solid rgba(255,212,94,.24); padding:2px 8px; border-radius:999px; white-space:nowrap}
  .paytag{font-size:10.5px; font-weight:800; color:var(--gold); background:rgba(255,212,94,.12); padding:2px 7px; border-radius:999px; white-space:nowrap}
  .paytag.pt{color:#ff9a9a; background:rgba(255,107,107,.14)}
  .vcount{font-size:11px;font-weight:800;color:var(--bad);background:rgba(255,107,107,.16);border-radius:999px;min-width:20px;height:20px;display:inline-grid;place-items:center;padding:0 5px}
  .vbtn{font-weight:800; font-size:12.5px; padding:9px 13px; border-radius:11px; background:rgba(255,107,107,.16); border:1px solid rgba(255,107,107,.3); color:#ffd0d0; white-space:nowrap}
  .undo{font-size:16px; color:var(--muted); background:var(--surface); border:1px solid var(--line); width:38px; height:38px; border-radius:50%; display:inline-grid; place-items:center; padding:0; flex:none}
  .undo:active{background:rgba(255,255,255,.12)}

  /* navegador de días */
  .daynav{display:flex;align-items:center;gap:8px;margin:16px 0 2px}
  .dnbtn{width:42px;height:42px;flex:none;border-radius:12px;background:var(--surface);border:1px solid var(--line);font-size:16px;color:var(--text);display:grid;place-items:center}
  .dnbtn:disabled{opacity:.25}
  .dnmid{flex:1;text-align:center}
  .dnday{font-family:var(--disp);font-weight:800;font-size:15px}
  .dnhoy{display:inline-block;margin-top:4px;font-size:11px;font-weight:800;color:#2a1d00;background:var(--gold);border-radius:999px;padding:3px 10px}
  .pastnote{font-size:12px;color:var(--gold);background:rgba(255,212,94,.1);border:1px solid rgba(255,212,94,.25);border-radius:12px;padding:9px 12px;margin:8px 0 10px;line-height:1.45}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:9px}
  .tile{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:13px 14px}
  .tile .k{font-size:11px;font-weight:800;color:var(--faint);letter-spacing:.05em;text-transform:uppercase}
  .tile .v{font-family:var(--disp);font-weight:800;font-size:25px;margin-top:5px;line-height:1;display:flex;align-items:baseline;gap:6px}
  .tile .v small{font-size:12px;font-weight:700;color:var(--muted);font-family:var(--body)}
  .lvlbar{height:8px;border-radius:999px;background:#120D20;overflow:hidden;margin-top:9px;border:1px solid var(--line)}
  .lvlbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--p1),var(--p2));transition:width .5s}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px}
  .card h3{font-size:15px;margin-bottom:4px}
  .rowbtw{display:flex;align-items:center;justify-content:space-between;gap:10px}

  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:8px}
  .cal .wd{font-size:10px;color:var(--faint);text-align:center;font-weight:700;padding-bottom:2px}
  .cell{aspect-ratio:1;border-radius:9px;background:#171029;display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--faint);position:relative;border:1px solid transparent}
  .cell.today{border-color:var(--gold)}
  .cell.future{opacity:.35}
  .cell .vdot{position:absolute;bottom:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--bad)}

  .badges{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .badge{border-radius:16px;background:var(--surface);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;text-align:center;padding:14px 6px;opacity:.4;filter:grayscale(.8)}
  .badge.on{opacity:1;filter:none;background:linear-gradient(160deg,rgba(255,212,94,.14),rgba(255,255,255,.04));border-color:rgba(255,212,94,.3)}
  .badge .bi{font-size:24px}
  .badge .bl{font-size:10px;font-weight:700;line-height:1.15;color:var(--muted)}
  .badge.on .bl{color:var(--text)}

  .mrow{display:flex;align-items:center;gap:11px;padding:11px 12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:8px}
  .mrow .he{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:19px;background:#1e1738;flex:none}
  .iconbtn{width:34px;height:34px;border-radius:10px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;font-size:14px;flex:none}
  .arch{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:8px}
  .arch .mon{font-weight:800;font-size:13px}
  .arch .win{font-size:12px;font-weight:800}

  label.fl{font-size:12px;font-weight:700;color:var(--muted);display:block;margin:12px 0 6px}
  input[type=text],input[type=number]{width:100%;padding:11px 12px;border-radius:12px;background:#160f28;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:15px}
  input[type=color]{width:48px;height:40px;border:1px solid var(--line);border-radius:10px;background:#160f28;padding:3px}
  .seg{display:flex;gap:6px;background:#120D20;border:1px solid var(--line);border-radius:12px;padding:4px}
  .seg button{flex:1;padding:9px;border-radius:9px;font-weight:700;font-size:13px;color:var(--muted)}
  .seg button.on{background:var(--surface2);color:var(--text)}
  .quickEmoji{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .quickEmoji button{width:34px;height:34px;border-radius:9px;background:#160f28;border:1px solid var(--line);font-size:17px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:800;font-size:13.5px;padding:10px 14px;border-radius:12px;transition:.15s}
  .btn.gold{background:var(--gold);color:#2a1d00}
  .btn.ghost{background:var(--surface);border:1px solid var(--line);color:var(--text)}
  .btn.full{width:100%}
  .btn.sm{padding:8px 12px;font-size:12.5px}

  .overlay{position:fixed;inset:0;background:rgba(8,5,16,.66);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:50}
  .modal{width:100%;max-width:540px;background:var(--bg2);border:1px solid var(--line);border-radius:24px 24px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto;animation:slideup .28s cubic-bezier(.22,1,.36,1)}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal h2{font-size:19px;margin-bottom:2px}
  .modalHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}

  .nav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}
  .navinner{display:flex;gap:4px;background:rgba(27,19,51,.92);backdrop-filter:blur(12px);border:1px solid var(--line);border-bottom:none;border-radius:18px 18px 0 0;padding:8px;width:100%;max-width:540px;justify-content:space-around}
  .navinner button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border-radius:12px;color:var(--faint);font-size:10.5px;font-weight:700}
  .navinner button .ni{font-size:20px;line-height:1}
  .navinner button.on{color:var(--text);background:var(--surface)}

  .empty{text-align:center;color:var(--muted);font-size:13px;padding:24px 10px;line-height:1.5}
  .loader{display:grid;place-items:center;height:90vh;gap:14px;color:var(--muted);text-align:center;padding:20px}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--p1);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .note{font-size:11.5px;color:var(--faint);line-height:1.55;margin-top:14px;padding:13px 14px;background:var(--surface);border:1px solid var(--line);border-radius:14px}
  .note b{color:var(--muted)}
  .danger{color:#ff8a8a}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

// Reinicia SOLO el progreso (marcadores + monedero + histórico). Conserva hábitos, antojos y jugadores.
function resetProgress(s){
  const n=JSON.parse(JSON.stringify(s));
  n.log={}; (n.players||[]).forEach(p=>{ n.log[p.id]={}; });
  n.archive=[]; n.startDate=todayKey(); n.monthKey=monthKeyOf(new Date());
  return n;
}

/* ---------- cálculos ---------- */
const dayOf=(s,pid,k)=>(s.log[pid]&&s.log[pid][k])||null;

function pOfH(s,hid){ const h=s.habits.find(x=>x.id===hid); return h?h.points:0; }
function pOfV(s,vid){ const v=s.vices.find(x=>x.id===vid); return v?v.price:0; }

// Un antojo se guarda como lista de eventos {pay:'c'|'p'}. Normaliza (soporta datos antiguos).
function viceList(v){
  if(!v) return [];
  if(Array.isArray(v)) return v;
  if(typeof v==='number') return Array.from({length:v},function(){return {pay:'p'};});
  if(typeof v==='object'){ const a=[]; for(let i=0;i<(v.c||0);i++)a.push({pay:'c'}); for(let i=0;i<(v.p||0);i++)a.push({pay:'p'}); return a; }
  return [];
}
// MONEDERO (hucha perpetua): hábitos de siempre − antojos pagados CON CRÉDITO
function creditOf(s,pid){
  const log=s.log[pid]||{}; let c=0;
  for(const k in log){ const day=log[k];
    if(day.habits) for(const hid in day.habits){ if(day.habits[hid]) c+=pOfH(s,hid); }
    if(day.vices) for(const vid in day.vices){ const price=pOfV(s,vid); for(const e of viceList(day.vices[vid])){ if(e.pay==='c') c-=price; } }
  }
  return c;
}
// DUELO del mes: hábitos del mes − antojos del mes pagados DEL DUELO
function duelMonthOf(s,pid,mk){
  const log=s.log[pid]||{}; let p=0;
  for(const k in log){ if(monthKeyOf(parseKey(k))!==mk) continue; const day=log[k];
    if(day.habits) for(const hid in day.habits){ if(day.habits[hid]) p+=pOfH(s,hid); }
    if(day.vices) for(const vid in day.vices){ const price=pOfV(s,vid); for(const e of viceList(day.vices[vid])){ if(e.pay==='p') p-=price; } }
  }
  return p;
}
function xpOf(s,pid){ const log=s.log[pid]||{}; let xp=0;
  for(const k in log){ const day=log[k]; if(day.habits) for(const hid in day.habits){ if(day.habits[hid]) xp+=pOfH(s,hid); } }
  return xp;
}
function streaksFor(s,pid){
  const dailies=s.habits; const log=s.log[pid]||{}; const tk=todayKey();
  const res={}; dailies.forEach(h=>res[h.id]=0);
  let start=s.startDate; for(const k in log){ if(k<start) start=k; }
  for(let dt=new Date(parseKey(start)); dkey(dt)<=tk; dt=addDays(dt,1)){
    const k=dkey(dt), isT=k===tk, day=log[k], hab=(day&&day.habits)||{};
    dailies.forEach(h=>{ if(hab[h.id]) res[h.id]++; else if(!isT) res[h.id]=0; });
  }
  return res;
}
function statsFor(s,pid){
  const streaks=streaksFor(s,pid);
  const maxStreak=Math.max(0,...Object.values(streaks));
  const duelMonth=duelMonthOf(s,pid,s.monthKey);
  const credit=creditOf(s,pid);
  const xp=xpOf(s,pid); const level=Math.floor(xp/50)+1; const lvlProg=(xp%50)/50;
  const log=s.log[pid]||{};
  let everBig=false, everClean=false, ever=false;
  for(const k in log){ const day=log[k]; const hab=(day.habits)||{}; const vic=(day.vices)||{};
    let hp=0,hc=0; for(const hid in hab){ if(hab[hid]){ const pp=pOfH(s,hid); if(pp){hp+=pp;hc++;ever=true;} } }
    let vc=0; for(const vid in vic) vc+=viceList(vic[vid]).length;
    if(hp>=25) everBig=true;
    if(hc>=3 && vc===0) everClean=true;
  }
  const champ=(s.archive||[]).some(a=>a.winner===pid);
  const un=new Set();
  if(ever) un.add('first'); if(maxStreak>=7) un.add('s7'); if(everBig) un.add('big');
  if(level>=5) un.add('lvl5'); if(everClean) un.add('clean'); if(champ) un.add('champ');
  return {streaks,maxStreak,duelMonth,credit,xp,level,lvlProg,unlocked:un};
}
function rollover(s){
  const cmk=monthKeyOf(new Date());
  if(s.monthKey===cmk) return s;
  if(!(s.archive||[]).some(a=>a.monthKey===s.monthKey)){
    const e={monthKey:s.monthKey,scores:{},winner:null};
    s.players.forEach(p=>e.scores[p.id]=duelMonthOf(s,p.id,s.monthKey));
    const[a,b]=s.players; const sa=e.scores[a.id],sb2=e.scores[b.id];
    e.winner=sa===sb2?'tie':(sa>sb2?a.id:b.id);
    s.archive=[e,...(s.archive||[])].slice(0,24);
  }
  s.monthKey=cmk; return s;
}

        st=rollover(st);

        setData(st); setConn('ok');
        const ch=sb.channel('room-duelo')
          .on('postgres_changes',{event:'UPDATE',schema:'public',table:'game',filter:`id=eq.${ROOM}`},payload=>{
            const st=payload.new && payload.new.state;

        chRef.current=ch;
      }catch(e){ if(alive){ setConn('err'); setErrMsg((e&&e.message)||'Sin conexión'); } }

    ))}

    <div className="sectlabel">El premio del mes</div>
    <div className="card"><input type="text" value={data.prize} onChange={e=>update(n=>{n.prize=e.target.value;})} placeholder="¿Qué se lleva quien gane?" /></div>

    <div className="sectlabel">Histórico de duelos</div>
    {(!data.archive||data.archive.length===0)
      ? <div className="empty">Aún no ha cerrado ningún mes.<br/>El primer ganador saldrá aquí al empezar el mes siguiente.</div>
      : data.archive.map((a,i)=>{ const[y,m]=a.monthKey.split('-').map(Number); const win=a.winner==='tie'?null:data.players.find(p=>p.id===a.winner);
          return (<div className="arch" key={i}><div><div className="mon">{MESES[m-1]} {y}</div><div className="faint" style={{fontSize:11.5}}>{data.players.map(p=>p.emoji+' '+(a.scores[p.id]||0)).join('  ·  ')}</div></div><div className="win" style={{color:win?win.color:'var(--muted)'}}>{win?('🏆 '+win.name):'🤝 Empate'}</div></div>); })}

    <div className="note">
      <b>Cómo funciona · </b>Cada hábito suma a la vez <b>un punto</b> al Duelo del mes y <b>un crédito</b> a tu monedero (una hucha para siempre), por separado. Al hacer un antojo eliges: pagarlo <b>con créditos</b> (tu Duelo no se toca) o <b>del Duelo</b> (guardas tus créditos). Si no tienes créditos, va directo al Duelo. Todo en la nube y sincronizado con Greta.
      <br/><br/>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <button className="btn ghost sm" onClick={async()=>{ if(confirm('¿Poner a CERO los marcadores y el monedero de los dos?\n\nSe CONSERVAN tus hábitos, antojos y jugadores. No se puede deshacer.')){ await saveRemote(resetProgress(data)); location.reload(); } }}>↺ Reiniciar solo los puntos (mantiene tu configuración)</button>
        <button className="btn ghost sm" style={{color:'var(--danger)'}} onClick={async()=>{ if(confirm('¿BORRAR TODO y volver a los valores de fábrica?\n\nSe pierden también tus hábitos y antojos personalizados. No se puede deshacer.')){ await saveRemote(seed()); location.reload(); } }}>🗑️ Borrar todo (volver de fábrica)</button>
      </div>
      <div className="faint" style={{fontSize:11,textAlign:'center',marginTop:14,opacity:.7}}>El Duelo · versión 4 · días anteriores + deshacer arreglado</div>
    </div>
    <div style={{height:8}}></div>
  </div>
  );
}

/* ================= MODAL ================= */
function Modal({modal,setModal,data,update}){
  const isVice=modal.type==='vice'; const editing=modal.item;
  const [name,setName]=useState(editing?editing.name:'');
  const [emoji,setEmoji]=useState(editing?editing.emoji:(isVice?'🍔':'✅'));
  const [val,setVal]=useState(editing?(isVice?editing.price:editing.points):(isVice?30:1));
  const QH=['💧','📖','💪','🚭','🪥','📵','📴','⏰','🧹','☀️','🧘','🥗','🏃','😴','✍️','🦷'];
  const QV=['🚬','🍔','🍰','🍺','🌚','🥱','📱','🛋️'];
  const Q=isVice?QV:QH;
  function save(){ if(!name.trim()) return;
    update(n=>{
      const arr=isVice?n.vices:n.habits;
      if(editing){ const it=arr.find(x=>x.id===editing.id); it.name=name.trim(); it.emoji=emoji; if(isVice) it.price=Math.max(1,parseInt(val)||1); else it.points=Math.max(1,parseInt(val)||1); }
      else{ const it={id:uid(),name:name.trim(),emoji}; if(isVice) it.price=Math.max(1,parseInt(val)||1); else it.points=Math.max(1,parseInt(val)||1); arr.push(it); }
    });
    setModal(null);
  }
  return (
  <div className="overlay" onClick={e=>{ if(e.target===e.currentTarget) setModal(null); }}>
    <div className="modal">
      <div className="modalHead"><h2>{editing?'Editar':'Nuevo'} {isVice?'antojo':'hábito'}</h2><button className="iconbtn" onClick={()=>setModal(null)}>✕</button></div>
      <label className="fl">Nombre</label>
      <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder={isVice?'Ej.: Refresco azucarado':'Ej.: Estirar 5 min'} autoFocus />
      <label className="fl">Icono</label>
      <input type="text" value={emoji} maxLength={3} onChange={e=>setEmoji(e.target.value)} style={{fontSize:22,width:70,textAlign:'center'}} />
      <div className="quickEmoji">{Q.map(e=><button key={e} onClick={()=>setEmoji(e)}>{e}</button>)}</div>
      <label className="fl">{isVice?'Precio (lo que te resta)':'Puntos al cumplir'}</label>
      <input type="number" min="1" max="500" value={val} onChange={e=>setVal(e.target.value)} />
      <div style={{display:'flex',gap:9,marginTop:18}}>
        <button className="btn ghost full" onClick={()=>setModal(null)}>Cancelar</button>
        <button className="btn gold full" onClick={save}>{editing?'Guardar':'Crear'}</button>
      </div>
    </div>
  </div>
  );
}

function hexA(hex,a){ let h=hex.replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join(''); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); return `rgba(${r},${g},${b},${a})`; }

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
